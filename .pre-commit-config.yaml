repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: "🔐 Scan for secrets (gitleaks)"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: local
    hooks:
      - id: js-syntax-check
        name: "🟨 JS syntax check (index.html)"
        language: system
        entry: bash -c 'TMP=$(mktemp /tmp/lf_js_XXXXXX.js); awk "/<script[^>]*>/{flag=1;next} /<\/script>/{flag=0} flag" src/gateway/static/index.html > "$TMP"; node --check "$TMP"; RC=$?; rm -f "$TMP"; exit $RC'
        files: src/gateway/static/index\.html$
        pass_filenames: false
