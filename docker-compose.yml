# docker-compose.yml
# LegionForge container stack.
#
# Default services (always run):
#   - guardian: security sidecar (127.0.0.1:9766)
#
# Optional profile: ollama-docker
#   Runs Ollama in a container on the internal legionforge-net network.
#   NOT exposed to the host or external network — only LegionForge containers
#   reach it via http://ollama:11434.
#
#   ⚠️  IMPORTANT TRADE-OFF on Apple Silicon:
#   Containerised Ollama runs CPU-only (no Metal GPU acceleration).
#   Inference is 3–5x slower than native Homebrew Ollama on M-series chips.
#   Use the Docker profile only when:
#     - Deploying to Linux/cloud (Docker is the preferred mode there)
#     - Testing in CI without a GPU
#     - You want strict network isolation and accept the CPU-only penalty
#
#   Default (recommended for Apple Silicon dev): native Ollama via Homebrew.
#   Services reach native Ollama via host.docker.internal:11434.
#
# Usage:
#   make guardian-start                  — start Guardian (default)
#   make ollama-docker-start             — start Dockerised Ollama (CPU-only)
#   make ollama-docker-stop              — stop Dockerised Ollama
#   make docker-build                    — build all images
#   make docker-up                       — start all runnable default services

services:
  guardian:
    build:
      context: .
      dockerfile: guardian/Dockerfile
    image: legionforge-guardian:latest
    container_name: legionforge-guardian
    restart: unless-stopped
    ports:
      # Note: 127.0.0.1 binding is unreliable on macOS Docker Desktop with custom networks.
      # Use 0.0.0.0 and rely on firewall/network isolation instead.
      - "9766:9766"
    environment:
      # Guardian connects to native Homebrew Postgres via host.docker.internal
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5432"
      POSTGRES_DB: legionforge
      # Guardian connects as its dedicated least-privilege role (legionforge_guardian).
      # Override POSTGRES_USER env var if your superuser name differs from the default.
      POSTGRES_USER: ${POSTGRES_USER:-legionforge_guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      # JWT task token signing secret — must match the value in the host Keychain.
      # Add to ~/.zshrc:
      #   export TASK_TOKEN_SECRET=$(security find-generic-password -s legionforge_task_tokens -a api_key -w 2>/dev/null)
      TASK_TOKEN_SECRET: ${TASK_TOKEN_SECRET:-}
      # Ollama: defaults to native Homebrew Ollama via host.docker.internal.
      # When using Dockerised Ollama (make ollama-docker-start), override with:
      #   OLLAMA_BASE_URL=http://ollama:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Guardian config — auth enabled by default; override with GUARDIAN_REQUIRE_AUTH=false
      # only in dev environments without a configured TASK_TOKEN_SECRET.
      GUARDIAN_REQUIRE_AUTH: "true"
      PYTHONPATH: /app
      LOG_LEVEL: info
    networks:
      - legionforge-net
    extra_hosts:
      # Required on Linux; macOS Docker Desktop provides this automatically
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: >
        python -c "import urllib.request; urllib.request.urlopen('http://localhost:9766/health')"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # agent-base: build-only — provides the base image for future agent containers.
  # Not started in Phase 2. Activate with: docker-compose --profile build-only build agent-base
  agent-base:
    build:
      context: .
      dockerfile: Dockerfile.agent-base
    image: legionforge-agent-base:latest
    profiles:
      - build-only
    # No ports, no restart — this is a build target, not a running service

  # Phase 6: analyzer — deny-default sandbox for AI-generated function testing.
  # Build-only profile: docker-compose --profile build-only build analyzer
  # The image is invoked on-demand by _build_container_cmd() in crystallization_analyzer.py.
  # It is NOT started as a persistent service — each test case runs a fresh container.
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    image: legionforge-analyzer:latest
    profiles:
      - build-only
    # No ports, no restart — invoked per test case by _run_test_in_subprocess()
    # Security: --network none, --read-only, --memory 128m applied at invocation time

  # Phase 6: pentest — air-gapped red-team container.
  # Build-only profile: make build-pentest
  # Run via: make pentest  or  make pentest-resilience
  #
  # CRITICAL security constraints (enforced at OS/Docker layer):
  #   network_mode: none  — no outbound network; air-gap is NOT software policy
  #   read_only: true     — immutable container filesystem
  #   user: pentest       — non-root unprivileged process
  #
  # What is NOT in environment:
  #   - No production API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)
  #   - No LangSmith tracing (traces must not contaminate production project)
  #   - No Keychain access (container is network-isolated anyway)
  pentest:
    build:
      context: .
      dockerfile: Dockerfile.pentest
    image: legionforge-pentest:latest
    profiles:
      - pentest
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=10m
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges
    pids_limit: 50
    environment:
      # Pentest DB — isolated from production legionforge DB
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      PENTEST_DB: legionforge_pentest
      # Task token signing secret — needed for privilege escalation tests
      TASK_TOKEN_SECRET: ${TASK_TOKEN_SECRET:-pentest-stub-secret}
      # Hardware profile — must be set for config/settings.py to load
      AGENT_HARDWARE_PROFILE: ${AGENT_HARDWARE_PROFILE:-mac_m4_mini_16gb}
      PYTHONPATH: /pentest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No ports — pentest runs are one-shot jobs, not persistent services
    # No restart policy — runs once and exits

  # ── Dockerised Ollama (optional, internal-only) ────────────────────────────
  #
  # Profile: ollama-docker
  # Start:   docker-compose --profile ollama-docker up -d ollama
  #          OR: make ollama-docker-start
  #
  # Network: Only reachable by other containers on legionforge-net.
  #          NOT bound to a host port — external network cannot reach Ollama.
  #
  # CPU-only on Apple Silicon:
  #   The official ollama/ollama image does not have access to the Metal GPU
  #   from inside Docker Desktop. Inference will run on CPU cores only.
  #   Throughput: ~5–15 tok/s for 8B models (vs ~60+ tok/s native with Metal).
  #
  # Models:
  #   Stored in the named volume 'ollama-models' for persistence across restarts.
  #   On first start, pull models manually:
  #     docker exec legionforge-ollama ollama pull llama3.1:8b
  #     docker exec legionforge-ollama ollama pull qwen2.5:3b
  #     docker exec legionforge-ollama ollama pull nomic-embed-text
  #   OR use: make ollama-docker-pull
  #
  # Config for gateway/agents when using Docker Ollama:
  #   Set OLLAMA_BASE_URL=http://ollama:11434 inside other containers, OR
  #   set OLLAMA_BASE_URL=http://localhost:11436 from the host
  #   (port 11436 is the host-facing port only when OLLAMA_EXPOSE_HOST=true).
  #
  ollama:
    image: ollama/ollama:latest
    container_name: legionforge-ollama
    profiles:
      - ollama-docker
    restart: unless-stopped
    networks:
      - legionforge-net
    # No host-port binding by default — Ollama is internal only.
    # Uncomment below ONLY for local dev debugging (never in production):
    # ports:
    #   - "127.0.0.1:11436:11434"  # 127.0.0.1 only, non-standard port
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # Disable Ollama's own telemetry
      OLLAMA_NO_PRUNE: "1"
      # Bind to all container interfaces (required for container-to-container)
      OLLAMA_HOST: "0.0.0.0:11434"
    mem_limit: 12g          # Cap at 12GB — leaves headroom for gateway + guardian
    cpus: 8.0               # Allow up to 8 CPU cores for inference
    healthcheck:
      test: >
        sh -c "curl -sf http://localhost:11434/api/tags > /dev/null"
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Gateway (with Docker Ollama support) ──────────────────────────────────
  # When running with the ollama-docker profile, other containers should
  # set OLLAMA_BASE_URL=http://ollama:11434. The guardian and gateway
  # services inherit this when the profile is active.

networks:
  legionforge-net:
    driver: bridge
    internal: true   # No external routing — containers only talk to each other

volumes:
  ollama-models:
    name: legionforge-ollama-models
