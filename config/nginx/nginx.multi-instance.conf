# config/nginx/nginx.multi-instance.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx load balancer for multi-instance LegionForge gateway deployment.
#
# Key design decisions:
#   - Round-robin (default) across gateway replicas — no sticky sessions needed
#     because stream tokens are stored in shared Redis, not per-instance memory.
#   - SSE streaming requires proxy_buffering off + extended timeouts.
#   - X-Forwarded-For passed through so gateway can log client IPs.
#   - Health check endpoint (/health) served without auth for load balancer probes.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream — gateway replicas ─────────────────────────────────────────
    # Docker Compose service named "gateway" — replicas are round-robin'd automatically.
    # No ip_hash / sticky sessions needed: stream tokens live in shared Redis.
    upstream legionforge_gateway {
        server gateway:8080;
        # When scaled (--scale gateway=N), Docker DNS resolves to all replicas.
        # For explicit upstream list, add:
        #   server gateway_2:8080;
        #   server gateway_3:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Proxy settings ─────────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";   # keep-alive to upstream

        # Standard request timeout
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Max body size for task submissions (4000 chars + metadata)
        client_max_body_size 1m;

        # ── SSE streaming (/tasks/{id}/stream) ─────────────────────────────
        # proxy_buffering must be off for SSE — Nginx must flush chunks immediately.
        # Read timeout must exceed the longest expected task duration.
        location ~ ^/tasks/[^/]+/stream$ {
            proxy_pass         http://legionforge_gateway;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;   # 10 minutes — adjust to max task duration
            proxy_set_header   Connection "";
        }

        # ── All other endpoints ─────────────────────────────────────────────
        location / {
            proxy_pass http://legionforge_gateway;
        }

        # ── Load balancer health check (no auth required) ───────────────────
        location = /health {
            proxy_pass http://legionforge_gateway;
            access_log off;
        }
    }

    # ── HTTPS (uncomment when certificates are available) ──────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name legionforge.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #
    #     location ~ ^/tasks/[^/]+/stream$ {
    #         proxy_pass         http://legionforge_gateway;
    #         proxy_buffering    off;
    #         proxy_cache        off;
    #         proxy_read_timeout 600s;
    #         proxy_set_header   Connection "";
    #     }
    #
    #     location / {
    #         proxy_pass http://legionforge_gateway;
    #     }
    # }
    #
    # Redirect HTTP → HTTPS:
    # server {
    #     listen 80;
    #     server_name legionforge.example.com;
    #     return 301 https://$host$request_uri;
    # }
}
