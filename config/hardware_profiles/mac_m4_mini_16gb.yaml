# ============================================================
# Hardware Profile: Mac Mini M4 — 16GB RAM / 256GB Internal / 1TB External
# ============================================================
# This file fully describes the hardware and software environment
# for running the LangGraph agent framework on this machine.
# To use a different machine, copy this file, rename it, and
# update the values below. The framework reads this at startup.
# ============================================================

profile:
  name: "mac_m4_mini_16gb"
  description: "Mac Mini M4, 16GB unified memory, 256GB internal, 1TB external"
  platform: "macos"
  chip_family: "apple_silicon"       # apple_silicon | intel | amd | nvidia
  chip_model: "m4"                   # m4 | m4_pro | m4_max | m5 | m5_pro | m5_max
  python_min_version: "3.11"

# ── Memory ──────────────────────────────────────────────────
memory:
  total_gb: 16
  # Memory budget breakdown (must sum to <= total_gb)
  os_reserved_gb: 4           # macOS baseline
  framework_reserved_gb: 2    # LangGraph + Python runtime
  available_for_models_gb: 10 # Remaining for LLM inference

  # Model concurrency limits (derived from available_for_models_gb)
  # These are enforced by the framework at runtime
  max_concurrent_models: 2
  max_primary_model_size_gb: 7    # Largest single model to load
  max_secondary_model_size_gb: 3  # Router/classifier model alongside primary

# ── Storage ─────────────────────────────────────────────────
storage:
  internal:
    total_gb: 256
    mount_path: "/"
    # What lives on internal SSD
    uses:
      - python_envs
      - source_code
      - config_files
      - small_databases      # SQLite checkpoints if external unavailable

  external:
    total_gb: 1000
    mount_path: "/Volumes/MAC_MINI_1TB"   #
    enabled: true
    # What lives on external drive
    uses:
      - llm_models
      - checkpoints
      - logs
      - datasets
      - vector_stores

# ── Paths ────────────────────────────────────────────────────
# All paths are relative to workspace_root, which is derived at runtime
# from the location of config/settings.py (project root). Override with
# the WORKSPACE_ROOT environment variable if needed.
paths:
  # workspace_root is injected at runtime — do not set here

  models:
    ollama:      "models/ollama"
    lmstudio:    "models/lmstudio"
    huggingface: "models/hf"

  runtime:
    checkpoints: "checkpoints"
    logs:        "logs"
    vector_store: "vector_store"
    datasets:    "data"

  internal:
    venv:   "venv"   # Virtual environment
    source: ""       # Project root itself

# ── Local LLM Services ───────────────────────────────────────
local_services:
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    env_var_override: "OLLAMA_BASE_URL"   # Override with env var if needed

  lmstudio:
    enabled: false                         # Set true if using LMStudio
    base_url: "http://localhost:1234/v1"
    env_var_override: "LMSTUDIO_BASE_URL"

# ── Recommended Models for This Hardware Profile ─────────────
# The framework uses these defaults; override per-agent in agent config
models:
  primary:
    provider: "ollama"
    model_id: "llama3.1:8b"
    estimated_size_gb: 4.7
    use_cases:
      - general_reasoning
      - writing
      - analysis
    quantization: "q4_K_M"
    gguf_sha256: "667b0c1932bc6ffc593ed1d03f895bf2dc8dc6df21db3042284a6f4416b06a29"

  router:
    provider: "ollama"
    model_id: "qwen2.5:3b"
    estimated_size_gb: 2.0
    use_cases:
      - routing
      - classification
      - supervisor
    quantization: "q4_K_M"
    gguf_sha256: "5ee4f07cdb9beadbbb293e85803c569b01bd37ed059d2715faa7bb405f31caa6"

  embeddings:
    provider: "ollama"
    model_id: "nomic-embed-text:latest"
    estimated_size_gb: 0.3
    use_cases:
      - embeddings
      - rag
      - semantic_search
    gguf_sha256: "970aa74c0a90ef7482477cf803618e776e173c007bf957f635f1015bfcfef0e6"

  cloud_fallback:
    # Used when local model is insufficient for the task
    openai:
      model_id: "gpt-4o-mini"
      use_cases: [complex_reasoning, long_context]
    anthropic:
      model_id: "claude-sonnet-4-6"
      use_cases: [complex_reasoning, code_generation, long_context]

# ── Agent Safeguard Limits ────────────────────────────────────
# Tuned for 16GB hardware — adjust up for more powerful machines
safeguards:
  default_recursion_limit: 15
  max_recursion_limit: 30         # Hard ceiling — never exceed this
  default_token_budget: 50000     # Tokens per run
  max_token_budget: 150000
  loop_detection_window: 5        # Look at last N actions for repetition
  loop_detection_threshold: 3     # Trigger if same action repeats N times
  max_errors_per_run: 3
  step_counter_enabled: true
  human_interrupt_on_irreversible: true

# ── Observability ─────────────────────────────────────────────
observability:
  langsmith:
    enabled: true
    project_name: "local-agents-m4"
    env_var: "LANGSMITH_API_KEY"    # Key stored in macOS Keychain
  local_logging:
    enabled: true
    format: "json"
    log_dir: "logs"   # relative — resolved to workspace_root/logs at runtime
    rotation: "daily"
    retention_days: 30

# ── Security ──────────────────────────────────────────────────
security:
  secret_backend: "keychain"        # keychain | env_var | vault
  keychain_service_names:
    openai: "openai"
    anthropic: "anthropic"
    langsmith: "langsmith"
  prompt_injection_guard: true
  tool_permission_enforcement: true
  git_secret_scanning: true         # Reminder to use pre-commit hooks
  # Phase 2: Guardian sidecar enforcement
  guardian_enabled: true
  guardian_url: "http://localhost:9766"
  guardian_timeout_seconds: 2.0
  # Phase 2: Health server auth
  health_token_service: "legionforge_health"
  # Phase 3: Task-scoped JWT tokens
  task_token_secret_service: "legionforge_task_tokens"
  task_token_issuer: "legionforge"
  task_token_ttl_seconds: 3600
  # Phase 5: Ed25519 tool manifest signing
  tool_signing_enabled: true
  signing_key_service: "legionforge_tool_signer"
  # Phase 5.5: Credential store hardening
  purge_env_after_load: false      # true only if LLM client is store-aware
  keychain_access_allowed: true    # set false in Docker / Linux CI
  sandbox_exec_enabled: true       # macOS sandbox-exec for analyzer subprocess
  guardian_require_auth: false     # set true in production
  credentials_file_path: ""        # empty = ~/.config/legionforge/credentials.yaml
  # Phase 6: DB RBAC
  db_app_user: "legionforge_app"
  db_app_password_service: "legionforge_db_app"
  # Phase 6: Tool result injection halt
  halt_on_tool_result_injection: true
  # Phase 6: Analyzer Docker container (deny-default); falls back to sandbox-exec
  analyzer_container_enabled: true
  # Phase 6: Model integrity strict mode (raise on SHA256 mismatch)
  model_integrity_strict: false

# ── Tool Library (Phase 9) ───────────────────────────────────────────────────
tools:
  # Paths the file_read tool may access (symlinks resolved before check).
  # Empty list = tool refuses all paths until operator configures this.
  allowed_read_paths:
    - "/Volumes/MAC_MINI_1TB/LegionForge/workspace"
  # Paths the file_write tool may write to (must be a subdirectory of an allowed_read_path).
  # Executable extensions (.py .sh .bash .rb .pl .exe .bat) are always refused.
  allowed_write_paths:
    - "/Volumes/MAC_MINI_1TB/LegionForge/workspace/output"
  max_file_read_bytes: 51200    # 50 KB
  max_file_write_bytes: 51200   # 50 KB
  # HTTP tools
  http_timeout_seconds: 30.0
  max_response_bytes: 51200     # 50 KB
  max_post_body_bytes: 10240    # 10 KB
  # code_execute Docker sandbox
  sandbox_image: "legionforge-sandbox:latest"
  sandbox_timeout_seconds: 30
  sandbox_memory_mb: 256
  sandbox_cpus: 0.5
  sandbox_max_output_bytes: 10240  # 10 KB

# ── Gateway (Phase 10/12 — Multi-User + Auth Backends) ───────────────────────
gateway:
  # Default daily token budget for new gateway users (100k tokens/day).
  # Override per-user via: python -m src.cli.manage_users set-quota --username ...
  default_daily_token_limit: 100000
  # Auth backend: "api_key" (default) | "oidc" | "github" | "ldap" | "kerberos"
  # Switch by changing this value and restarting the gateway.
  auth_provider: api_key

  # ── OIDC (Phase 12) ────────────────────────────────────────────────────────
  # Required when auth_provider: oidc.  Covers Google, Okta, Auth0, Keycloak,
  # Azure AD, Cognito, and any OIDC-compliant IdP.
  oidc:
    issuer_url: ""          # e.g. https://accounts.google.com
    client_id: ""           # OAuth2 client ID from your IdP
    audience: ""            # Expected aud claim (defaults to client_id if empty)
    jwks_cache_ttl: 300     # Seconds to cache JWKS public keys
    userinfo_endpoint: ""   # Override discovery doc; empty = use discovery

  # ── LDAP / Active Directory (Phase 12) ────────────────────────────────────
  # Required when auth_provider: ldap.  Supports OpenLDAP and AD.
  ldap:
    url: ""                                   # ldap://ldap.example.com:389
    bind_dn: ""                               # Service account DN
    user_search_base: ""                      # ou=users,dc=example,dc=com
    user_search_filter: "(uid={username})"    # Use (sAMAccountName={username}) for AD
    daily_token_limit: 100000                 # Default budget for LDAP users

  # ── Kerberos / GSSAPI (Phase 13) ──────────────────────────────────────────
  # Required when auth_provider: kerberos.
  # Prerequisites: /etc/krb5.conf, HTTP service principal, gssapi package.
  # See docs/SCALING.md for full Kerberos setup instructions.
  kerberos:
    keytab_path: /etc/legionforge/http.keytab   # HTTP service keytab
    service_name: HTTP                           # GSSAPI service name
    realm: ""                                    # e.g. EXAMPLE.COM (empty = KDC default)
    daily_token_limit: 100000                    # Default budget for Kerberos users

  # ── Redis State Layer (Phase 13) ──────────────────────────────────────────
  # Optional. When empty, stream tokens are stored in the stream_tokens DB table
  # (suitable for single-instance deployments).
  # Set to enable cross-instance token sharing for multi-gateway deployments:
  #   redis_url: redis://localhost:6379/0
  # Or export REDIS_URL=redis://localhost:6379/0 without changing this file.
  redis_url: ""   # empty = DB-backed tokens (single-instance mode)

# ── Pentest (Phase 6 — PentestAgent) ────────────────────────────────────────
pentest:
  enabled: true
  default_mode: "verify"           # "verify" = stop-at-proof; "resilience" = measure blast radius
  max_payload_size_bytes: 4096
  stop_on_critical: true           # halt run on CRITICAL bypass; notify operator
  synthetic_db_name: "legionforge_pentest"
  report_format: "json"            # "json" | "markdown" | "html"
  stub_ollama_port: 11435          # separate port from real Ollama (11434)
