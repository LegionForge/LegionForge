name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: LegionForge/dev-rig/.github/workflows/lint.yml@main
    with:
      source-dirs: "src"

  test:
    uses: ./.github/workflows/test-with-pg.yml
    with:
      coverage-source: "src"
      # Scoped to smoke + integration only; UI / testlab / crystallization /
      # tool_accuracy / hallucination cover the rest of src via their own
      # Make targets, not this CI check. 40 is the realistic floor for this
      # slice. Raise as we shore up coverage in smoke/integration.
      coverage-threshold: 40

  sast:
    uses: LegionForge/dev-rig/.github/workflows/sast.yml@main
    with:
      source-dirs: "src"
    permissions:
      security-events: write

  audit:
    uses: LegionForge/dev-rig/.github/workflows/audit.yml@main

  secrets:
    uses: LegionForge/dev-rig/.github/workflows/secrets.yml@main
    permissions:
      contents: read

  sbom:
    uses: LegionForge/dev-rig/.github/workflows/sbom.yml@main

  trivy:
    uses: LegionForge/dev-rig/.github/workflows/trivy.yml@main
    permissions:
      security-events: write
      contents: read
