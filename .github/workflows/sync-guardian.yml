name: Sync LegionForge-Guardian

# Mirrors packages/guardian/ to github.com/LegionForge/guardian via pull
# request — the guardian repo's ruleset forbids direct and force pushes to
# main, so the old subtree force-push design no longer works.
#
# Design: snapshot sync. Each run overlays the current subtree content onto
# a fixed sync branch in the guardian repo as a single bot-authored commit,
# then opens (or updates) a PR. No history rewriting, no filter-repo, and no
# monorepo authorship propagates to the public repo.
#
# Prerequisites (one-time setup):
#   GUARDIAN_REPO_PAT repo secret — fine-grained PAT (resource owner:
#   LegionForge org) scoped to the guardian repo with:
#     Contents: Read and write
#     Workflows: Read and write   (subtree ships .github/workflows files)
#     Pull requests: Read and write

on:
  push:
    branches: [main]
    paths:
      - "packages/guardian/**"
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GUARDIAN_REPO: LegionForge/guardian
  SYNC_BRANCH: sync/monorepo

jobs:
  sync:
    name: PR sync to LegionForge/guardian
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Verify PAT is set
        env:
          PAT: ${{ secrets.GUARDIAN_REPO_PAT }}
        run: |
          echo "PAT length: ${#PAT}"
          if [ -z "$PAT" ]; then echo "ERROR: GUARDIAN_REPO_PAT secret is empty"; exit 1; fi

      - name: Clone guardian repo
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GUARDIAN_REPO_PAT }}@github.com/${GUARDIAN_REPO}.git" \
            guardian-repo

      - name: Overlay subtree content
        run: |
          rsync -a --delete --exclude='.git' packages/guardian/ guardian-repo/

      - name: Commit and push sync branch
        id: commit
        run: |
          cd guardian-repo
          git config user.email "noreply@github.com"
          git config user.name "LegionForge Sync Bot"
          git checkout -B "$SYNC_BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Guardian repo already matches the subtree — nothing to sync."
            exit 0
          fi
          git commit -m "chore: sync guardian from monorepo @ ${GITHUB_SHA::12}"
          git push --force origin "$SYNC_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR if none exists
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GUARDIAN_REPO_PAT }}
        run: |
          open_prs=$(gh pr list -R "$GUARDIAN_REPO" --head "$SYNC_BRANCH" --state open --json number --jq 'length')
          if [ "$open_prs" = "0" ]; then
            gh pr create -R "$GUARDIAN_REPO" \
              --head "$SYNC_BRANCH" --base main \
              --title "chore: sync guardian from monorepo" \
              --body "Automated snapshot sync of \`packages/guardian/\` from monorepo commit \`${GITHUB_SHA::12}\`."
          else
            echo "Open sync PR already exists — branch updated in place."
          fi
