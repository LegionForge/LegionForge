name: Sync LegionForge-Guardian

# Automatically pushes packages/guardian/ to the public guardian repo
# every time a change to that subtree lands on main.
#
# Prerequisites (one-time setup):
#   1. Repo: github.com/LegionForge/LegionForge-Guardian (empty, no auto-README)
#   2. Create a classic PAT with `repo` + `workflow` scope on that repo (as jp-cruz)
#   3. Store it as GUARDIAN_REPO_PAT in LegionForge/LegionForge repo secrets
#
# Note: git subtree push rewrites history to contain only commits that
# touched packages/guardian/. The guardian repo's main branch must start
# empty — if GitHub auto-created a README, delete it before the first run.

on:
  push:
    branches: [main]
    paths:
      - "packages/guardian/**"
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Subtree push to LegionForge-Guardian
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git subtree

      - name: Configure git identity
        run: |
          git config user.email "noreply@github.com"
          git config user.name "LegionForge Sync Bot"

      - name: Verify PAT is set
        env:
          PAT: ${{ secrets.GUARDIAN_REPO_PAT }}
        run: |
          echo "PAT length: ${#PAT}"
          if [ -z "$PAT" ]; then echo "ERROR: GUARDIAN_REPO_PAT secret is empty"; exit 1; fi

      - name: Add guardian public remote
        run: |
          # Unset the GITHUB_TOKEN extraheader injected by actions/checkout.
          # Without this, the GITHUB_TOKEN overrides our PAT for all GitHub requests.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote add guardian-public \
            https://x-access-token:${{ secrets.GUARDIAN_REPO_PAT }}@github.com/LegionForge/LegionForge-Guardian.git

      - name: Push guardian subtree to public repo
        run: |
          git subtree split --prefix=packages/guardian -b guardian-split
          git push guardian-public guardian-split:main --force
          git branch -D guardian-split
