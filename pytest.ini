[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    ui: Playwright browser-automation UI tests (require Chromium — run with make test-ui)
    integration: integration tests (require PostgreSQL)
    slow: slow tests excluded from test-fast
    functional: standard usage pattern tests (mock gateway, no services)
    security: security attack tests — all attacks must be blocked (mock gateway)
    dos: denial-of-service resilience tests (mock gateway)
    auth_attack: authentication attack tests (mock gateway)
    data_attack: data exfiltration and PII leak tests (mock gateway)
    novel: LLM-generated general tests (requires Ollama)
    novel_security: LLM-generated security tests (requires Ollama)
    cve: CVE-based security tests (requires NVD network + Ollama)
    tool_accuracy: direct tool accuracy tests (web_fetch/web_search) — no LLM, no services required
    tool_accuracy_llm: end-to-end researcher anti-hallucination tests — require Ollama + PostgreSQL
    hallucination: live hallucination detection tests — require Ollama + PostgreSQL + internet (manually run)
    live_web: tests that hit the real internet (manually run only)
    tool_integrity: tool runtime integrity tests — input/output safety, schema conformance (manually run)
    tool_integrity_guardian: Guardian sidecar end-to-end tests — require Guardian on :9766 (manually run)
    tool_integrity_sandbox: code_execute Docker sandbox containment tests — require sandbox image (manually run)
    tool_integrity_memory: memory_write/memory_recall isolation tests — require PostgreSQL (manually run)
