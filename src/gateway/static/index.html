<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegionForge</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --panel2:    #1c2128;
      --border:    #30363d;
      --border2:   #21262d;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --text-xdim: #484f58;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --orange:    #f0883e;
      --red:       #f85149;
      --purple:    #d2a8ff;
      --yellow:    #e3b341;
      --radius:    6px;
      --mono:      'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace, 'Noto Sans Mono', system-ui;
    }

    /* ── Light mode override (Phase 72) ─────────────────────────── */
    body.light-mode {
      --bg:        #f6f8fa;
      --panel:     #ffffff;
      --panel2:    #f0f2f5;
      --border:    #d0d7de;
      --border2:   #e1e4e8;
      --text:      #24292f;
      --text-dim:  #656d76;
      --text-xdim: #9ca3af;
      --blue:      #0969da;
      --green:     #1a7f37;
      --orange:    #bc4c00;
      --red:       #d1242f;
      --purple:    #8250df;
      --yellow:    #9a6700;
    }
    body.light-mode .syn-kw  { color: #8250df; }
    body.light-mode .syn-str { color: #0a3069; }
    body.light-mode .syn-cmt { color: #656d76; }
    body.light-mode .syn-num { color: #bc4c00; }
    body.light-mode .syn-bi  { color: #0969da; }
    /* theme toggle button */
    #theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 3px 7px;
      transition: border-color 0.2s, color 0.2s;
    }
    #theme-toggle:hover { border-color: var(--blue); color: var(--blue); }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    #app {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    #header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.02em;
    }
    #header .subtitle {
      color: var(--text-dim);
      font-size: 12px;
    }
    #conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-xdim);
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #conn-dot.live    { background: var(--green); }
    #conn-dot.pulse   { animation: pulse 1s ease-in-out; }
    #conn-dot.error   { background: var(--red); }
    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    /* ── Config row ──────────────────────────────────────────────── */
    #config { display: flex; flex-direction: column; gap: 10px; }
    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field-row label {
      width: 72px;
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 12px;
    }
    .field-row input[type="text"],
    .field-row input[type="password"],
    .field-row select {
      flex: 1;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-row input:focus,
    .field-row select:focus { border-color: var(--blue); }
    .field-row select option { background: var(--panel2); }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn:hover  { background: var(--border2); border-color: var(--text-dim); }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #2ea043; }
    .btn.danger  { border-color: #6e1a1a; color: var(--red); }
    .btn.danger:hover:not(:disabled) { background: #2d1317; }
    .btn.ghost   { border-color: transparent; color: var(--text-dim); }
    .btn.ghost:hover { border-color: var(--border); color: var(--text); }
    .btn.icon    { padding: 5px 8px; font-size: 14px; }

    /* ── Model preference toggle buttons (Phase 58) ─────────────── */
    .model-pref.active-pref {
      background: #1a3a5c;
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── Task rating buttons (Phase 59) ─────────────────────────── */
    .rating-bar { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .rating-bar .btn.rated { background:#1a3a5c; border-color:var(--blue); color:var(--blue); }

    /* ── Task input ──────────────────────────────────────────────── */
    #task-input {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px;
      resize: none;
      outline: none;
      min-height: 80px;
      max-height: 300px;
      overflow-y: auto;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    #task-input:focus { border-color: var(--blue); }

    /* ── Action bar ──────────────────────────────────────────────── */
    #action-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #char-count {
      margin-left: auto;
      color: var(--text-xdim);
      font-size: 11px;
    }

    /* ── Status bar ──────────────────────────────────────────────── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 22px;
      font-size: 12px;
      padding: 0 2px;
    }
    #status-indicator {
      font-size: 12px;
      font-weight: 600;
    }
    #status-indicator.running  { color: var(--yellow); }
    #status-indicator.complete { color: var(--green);  }
    #status-indicator.error    { color: var(--red);    }
    #status-indicator.cancelled{ color: var(--text-dim);}
    #status-detail { color: var(--text-dim); flex: 1; }
    #elapsed { color: var(--text-xdim); margin-left: auto; font-variant-numeric: tabular-nums; }

    /* ── Output ──────────────────────────────────────────────────── */
    #output-header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    #output-header .card-title { margin-bottom: 0; flex: 1; }
    #output {
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 200px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.65;
      unicode-bidi: plaintext;   /* proper RTL rendering for Arabic/Hebrew */
    }
    /* Output text classes */
    .o-ready   { color: var(--text-xdim); font-style: italic; }
    .o-status  { color: var(--text-dim);  font-style: italic; }
    .o-node    { color: var(--purple);    font-size: 11px; }
    .o-tool    { color: var(--orange); }
    .o-token   { color: var(--text); }
    .o-complete{ color: var(--green); font-weight: 600; }
    .o-error   { color: var(--red); }
    .o-cancelled{ color: var(--text-dim); }
    .o-result  { color: var(--text); border-top: 1px solid var(--border2); margin-top: 8px; padding-top: 8px; }
    /* ── Markdown output rendering (Phase 64) ───────── */
    .o-result h1,.o-result h2,.o-result h3 { color:var(--blue); margin:10px 0 4px; font-weight:700; }
    .o-result h1 { font-size:1.1em; } .o-result h2 { font-size:1.0em; } .o-result h3 { font-size:0.95em; }
    .o-result strong { color: var(--text); font-weight: 700; }
    .o-result em { font-style: italic; color: var(--text-dim); }
    .o-result code { background: var(--panel2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; font-family: monospace; font-size: 11px; }
    .o-result pre { background: var(--panel2); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; }
    .o-result pre code { background: none; border: none; padding: 0; }
    .o-result ul,.o-result ol { margin: 4px 0 4px 18px; }
    .o-result li { margin: 2px 0; }
    .o-result hr { border: none; border-top: 1px solid var(--border2); margin: 8px 0; }
    .o-result p { margin: 4px 0; }
    /* ── Live token stream accumulator (Phase 69) ───── */
    .o-stream { color: var(--text); border-top: 1px solid var(--border2); margin-top: 8px;
      padding-top: 8px; white-space: pre-wrap; font-size: 13px; }
    .o-stream::after { content: '▋'; animation: blink 0.9s step-end infinite;
      color: var(--blue); margin-left: 1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    /* ── Copy-result button (Phase 65) ──────────────── */
    .result-wrap { position: relative; }
    .result-copy-btn { position: absolute; top: 10px; right: 0; font-size: 11px; padding: 2px 6px;
      opacity: 0; transition: opacity 0.15s; pointer-events: none; }
    .result-wrap:hover .result-copy-btn { opacity: 1; pointer-events: auto; }
    /* ── Syntax highlighting (Phase 67) ─────────────── */
    .syn-kw   { color: #c792ea; }           /* keywords — purple */
    .syn-str  { color: #c3e88d; }           /* strings  — green */
    .syn-cmt  { color: #546e7a; font-style: italic; }  /* comments — grey */
    .syn-num  { color: #f78c6c; }           /* numbers  — orange */
    .syn-bi   { color: #82aaff; }           /* built-ins / types — blue */

    /* Tool block */
    .tool-block {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240, 136, 62, 0.08);
      border: 1px solid rgba(240, 136, 62, 0.25);
      border-radius: 4px;
      padding: 2px 8px;
      margin: 2px 0;
      font-size: 12px;
      color: var(--orange);
    }
    .tool-block .tool-status { font-size: 10px; }
    .tool-block.done { opacity: 0.7; }

    /* ── History ─────────────────────────────────────────────────── */
    #history-section summary {
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      list-style: none;
    }
    #history-section summary::before {
      content: '▶ ';
      font-size: 9px;
      transition: transform 0.2s;
    }
    #history-section[open] summary::before { content: '▼ '; }
    #history-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 280px;
      overflow-y: auto;
    }
    .history-item {
      display: grid;
      grid-template-columns: 16px 16px 80px 90px 1fr 60px;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--blue); }
    .history-item.starred { border-color: rgba(255, 200, 50, 0.4); }
    .history-item .hi-badge {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .hi-badge.complete  { background: var(--green); }
    .hi-badge.error, .hi-badge.failed { background: var(--red); }
    .hi-badge.cancelled { background: var(--text-xdim); }
    .hi-badge.running   { background: var(--yellow); }
    .hi-badge.queued    { background: var(--blue); }
    .history-item .hi-star { font-size: 11px; opacity: 0.35; cursor: pointer; user-select: none; transition: opacity 0.15s; }
    .history-item .hi-star:hover { opacity: 1; }
    .history-item.starred .hi-star { opacity: 1; color: #ffc832; }
    .history-item .hi-id     { color: var(--text-dim); font-size: 10px; }
    .history-item .hi-agent  { color: var(--purple);   font-size: 10px; }
    .history-item .hi-input  { color: var(--text);     overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .hi-tokens { color: var(--text-xdim); text-align: right; font-size: 10px; }
    #history-empty { color: var(--text-xdim); font-style: italic; font-size: 12px; padding: 8px 0; }

    /* ── Task search (Phase 62) ─────────────────────────────────── */
    #search-section summary {
      cursor: pointer; user-select: none;
      color: var(--text); font-size: 13px; font-weight: 600;
      list-style: none; padding: 4px 0;
    }
    #search-section summary::before { content: '▶ '; font-size: 9px; }
    #search-section[open] summary::before { content: '▼ '; }
    #search-input-row { display: flex; gap: 6px; margin-top: 8px; }
    #search-q { flex: 1; background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; font-size: 12px; }
    #search-q:focus { border-color: var(--blue); outline: none; }
    #search-results { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .sr-item {
      display: grid; grid-template-columns: 10px 70px 80px 1fr 55px; gap: 6px;
      align-items: center; padding: 5px 8px; background: var(--panel2);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    .sr-item:hover { border-color: var(--blue); }
    .sr-item .sr-badge { width:8px;height:8px;border-radius:50%; }
    .sr-item .sr-id    { color: var(--text-dim); }
    .sr-item .sr-agent { color: var(--purple); }
    .sr-item .sr-input { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .sr-item .sr-date  { color: var(--text-xdim); text-align: right; }
    #search-empty { color: var(--text-xdim); font-style: italic; font-size: 12px; padding: 8px 0; }

    /* ── Templates (Phase 61) ───────────────────────────────────── */
    #tmpl-section summary {
      cursor: pointer; user-select: none;
      color: var(--text); font-size: 13px; font-weight: 600;
      list-style: none; padding: 4px 0;
    }
    #tmpl-section summary::before { content: '▶ '; font-size: 9px; }
    #tmpl-section[open] summary::before { content: '▼ '; }
    #tmpl-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .tmpl-item {
      display: grid; grid-template-columns: 1fr auto auto; gap: 6px;
      align-items: center; padding: 6px 8px; background: var(--panel2);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    }
    .tmpl-item:hover { border-color: var(--blue); }
    .tmpl-item .ti-name { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tmpl-item .ti-agent { font-size: 10px; color: var(--purple); }
    .tmpl-item .ti-del { font-size: 11px; color: var(--text-dim); padding: 2px 6px; }
    .tmpl-item .ti-del:hover { color: var(--red); }
    #tmpl-empty { color: var(--text-xdim); font-style: italic; font-size: 12px; padding: 8px 0; }

    /* ── Tool block (blocked = security registry rejected the call) ── */
    .tool-block.blocked {
      background: rgba(248, 81, 73, 0.08);
      border-color: rgba(248, 81, 73, 0.4);
      color: var(--red);
    }
    .tool-block.blocked .tool-status { color: var(--red); }
    /* (i) info icon shown on blocked tool blocks */
    .tool-info {
      cursor: help;
      color: var(--text-dim);
      font-size: 10px;
      opacity: 0.75;
      margin-left: 2px;
    }
    /* ── Inline [UNVERIFIED DATA] warning ───────────────────────── */
    .o-unverified-marker {
      display: inline-block;
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.35);
      border-radius: 3px;
      padding: 1px 7px;
      color: var(--red);
      font-size: 11px;
      font-weight: 600;
      cursor: help;
      margin: 0 2px;
    }
    /* ── All-tools-failed banner ────────────────────────────────── */
    .all-tools-failed-banner {
      display: block;
      margin: 6px 0 2px;
      padding: 6px 10px;
      background: rgba(248, 81, 73, 0.10);
      border: 1px solid rgba(248, 81, 73, 0.30);
      border-radius: 4px;
      color: var(--red);
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── Version footer ─────────────────────────────────────────── */
    #version-footer {
      text-align: center;
      color: var(--text-xdim);
      font-size: 11px;
      padding: 8px 0 4px;
    }

    /* ── Scrollbar styling ───────────────────────────────────────── */
    ::-webkit-scrollbar            { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track      { background: transparent; }
    ::-webkit-scrollbar-thumb      { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover{ background: var(--text-xdim); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .field-row label { width: 56px; }
      .history-item { grid-template-columns: 12px 1fr 50px; }
      .history-item .hi-id, .history-item .hi-agent { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <div id="header">
    <h1>LegionForge</h1>
    <span class="subtitle">agent gateway</span>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    <div id="conn-dot" title="Stream connection status"></div>
  </div>

  <!-- ── Config card ────────────────────────────────────── -->
  <div class="card" id="config">
    <div class="card-title">Configuration</div>

    <div class="field-row">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="Paste your API key" autocomplete="off" spellcheck="false">
      <button class="btn ghost icon" id="key-toggle" onclick="toggleKeyVisibility()" title="Show/hide key">👁</button>
      <button class="btn ghost icon" onclick="clearApiKey()" title="Clear saved key">✕</button>
    </div>

    <div class="field-row">
      <label for="agent-type">Agent</label>
      <select id="agent-type">
        <option value="orchestrator">Orchestrator — multi-step tasks, planning + research + synthesis</option>
        <option value="researcher">Researcher — focused web research + document retrieval</option>
        <option value="base_agent">Base Agent — general LLM with tool access</option>
      </select>
    </div>

    <div class="field-row">
      <label>Model</label>
      <div id="model-pref-btns" style="display:flex;gap:6px;flex:1;">
        <button class="btn ghost model-pref" id="mp-fast" onclick="setModelPref('fast')" title="qwen2.5:3b — fast, lower quality">Fast</button>
        <button class="btn ghost model-pref active-pref" id="mp-balanced" onclick="setModelPref('balanced')" title="llama3.1:8b — default balance">Balanced</button>
        <button class="btn ghost model-pref" id="mp-powerful" onclick="setModelPref('powerful')" title="Best available model">Powerful</button>
      </div>
    </div>

    <div class="field-row">
      <label for="session-picker">Session</label>
      <select id="session-picker" onchange="onSessionChange(this.value)" title="Run within a persistent conversation session so the agent remembers prior turns">
        <option value="">— Standalone (no session) —</option>
      </select>
      <button class="btn ghost icon" onclick="newSession()" title="Create new session">＋</button>
      <button class="btn ghost icon" id="del-session-btn" onclick="deleteCurrentSession()" title="Delete this session" style="display:none">✕</button>
    </div>
  </div>

  <!-- ── Input card ─────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">Task</div>
    <textarea id="task-input"
      placeholder="Enter a task or question…&#10;&#10;Examples:&#10;  Research the latest developments in AI agent security&#10;  Summarize this document: [paste text]&#10;  What is the current threat landscape for RAG systems?"
      oninput="onTaskInput(this)"
      onkeydown="onTaskKeydown(event)"></textarea>

    <div id="action-bar" style="margin-top: 10px;">
      <button class="btn primary" id="submit-btn" onclick="submitTask()">▶ Submit <kbd style="font-size:10px;opacity:0.7">⌘↵</kbd></button>
      <button class="btn danger"  id="cancel-btn" onclick="cancelTask()" style="display:none">✕ Cancel</button>
      <button class="btn ghost"   onclick="clearOutput()">Clear</button>
      <!-- Phase 70: file attachment -->
      <label class="btn ghost" id="attach-label" title="Attach a text file (TXT, MD, CSV, JSON — max 16 KB)" style="cursor:pointer">
        📎 Attach
        <input type="file" id="attach-input" accept=".txt,.md,.csv,.json,.py,.js,.ts,.yaml,.yml,.log" style="display:none" onchange="onFileAttach(this)">
      </label>
      <span id="attach-name" style="font-size:11px;color:var(--text-dim);"></span>
      <span id="char-count"></span>
    </div>
  </div>

  <!-- ── Output card ────────────────────────────────────── -->
  <div class="card">
    <div id="output-header">
      <div class="card-title">Output</div>
      <div id="status-bar">
        <span id="status-indicator"></span>
        <span id="status-detail"></span>
        <span id="elapsed"></span>
      </div>
      <button class="btn ghost icon" onclick="copyOutput()" title="Copy output" style="margin-left:8px">⎘</button>
    </div>
    <div id="output"><span class="o-ready">Ready. Enter a task above and press Submit.</span></div>
  </div>

  <!-- ── Task Search (Phase 62) ──────────────────────────── -->
  <div class="card">
    <details id="search-section">
      <summary>Search Tasks</summary>
      <div id="search-input-row">
        <input id="search-q" type="search" placeholder="Search past tasks…" oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn ghost" style="font-size:11px;" onclick="doSearch()">Search</button>
      </div>
      <div id="search-results">
        <div id="search-empty" style="display:none">No results.</div>
      </div>
    </details>
  </div>

  <!-- ── Templates (Phase 61) ───────────────────────────── -->
  <div class="card">
    <details id="tmpl-section">
      <summary id="tmpl-summary">Templates (0)</summary>
      <div style="margin-top:8px;display:flex;gap:6px;">
        <button class="btn ghost" style="font-size:11px;" onclick="saveTemplate()" title="Save current prompt as a template">＋ Save prompt</button>
      </div>
      <div id="tmpl-list">
        <div id="tmpl-empty">No templates yet.</div>
      </div>
    </details>
  </div>

  <!-- ── History ────────────────────────────────────────── -->
  <div class="card">
    <details id="history-section">
      <summary id="history-summary">History (0) <button class="btn ghost icon" style="font-size:11px;padding:2px 6px;margin-left:8px" onclick="exportTasksMd(event)" title="Export task history as Markdown">↓ md</button></summary>
      <div id="history-list">
        <div id="history-empty">No tasks yet this session.</div>
      </div>
    </details>
  </div>

</div><!-- #app -->

<div id="version-footer">LegionForge <span id="footer-version">…</span> · <span id="footer-usage" style="display:none">Today: <span id="footer-usage-today">—</span> tok</span></div>

<script>
// ════════════════════════════════════════════════════════════════
//  LegionForge Web UI — Phase 72
//  Vanilla JS, no framework, single file.
// ════════════════════════════════════════════════════════════════

// ── State ────────────────────────────────────────────────────────
const S = {
  activeES:       null,   // EventSource
  activeTaskId:   null,   // string
  streamToken:    null,   // string
  startTime:      null,   // Date
  elapsedTimer:   null,   // setInterval handle
  pollTimer:      null,   // setInterval handle for fallback polling
  history:        [],     // [{task_id, agent_type, input_preview, status, elapsed_ms, tokens, ts}]
  outputBuffer:   '',     // plain-text accumulator for copy
  activeToolName: null,   // current open tool block
  heartbeatCount: 0,      // incremented on each heartbeat; reset on new task
  toolsAttempted: 0,      // tool_start events received this run
  toolsCompleted: 0,      // tool_end events received this run
  toolsBlocked:   0,      // tool_blocked events (or client-detected hanging blocks)
  sessionId:      null,   // string | null — active conversation session_id (Phase 57)
  modelPref:      'balanced', // 'fast' | 'balanced' | 'powerful' (Phase 58)
  templates:      [],     // cached template list (Phase 61)
  streamEl:       null,   // single accumulator element for live token streaming (Phase 69)
  attachText:     null,   // plain-text content of attached file (Phase 70)
  attachName:     null,   // original filename of attached file (Phase 70)
};

const MAX_HISTORY = 20;
const STORAGE_KEY = 'lf_history_v1';
const APIKEY_KEY  = 'lf_api_key';

// ── DOM refs ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = {
  apiKey:     () => $('api-key'),
  agentType:  () => $('agent-type'),
  taskInput:  () => $('task-input'),
  submitBtn:  () => $('submit-btn'),
  cancelBtn:  () => $('cancel-btn'),
  output:     () => $('output'),
  statusInd:  () => $('status-indicator'),
  statusDet:  () => $('status-detail'),
  elapsed:    () => $('elapsed'),
  connDot:    () => $('conn-dot'),
  histList:   () => $('history-list'),
  histEmpty:  () => $('history-empty'),
  histSummary:   () => $('history-summary'),
  charCount:     () => $('char-count'),
  sessionPicker: () => $('session-picker'),
  tmplList:      () => $('tmpl-list'),
  tmplEmpty:     () => $('tmpl-empty'),
  tmplSummary:   () => $('tmpl-summary'),
};

// ── Init ─────────────────────────────────────────────────────────
(function init() {
  initTheme();  // Phase 72: apply saved/system light-dark preference

  // Restore API key
  const saved = localStorage.getItem(APIKEY_KEY);
  if (saved) el.apiKey().value = saved;

  // Save API key on change; reload sessions when key is updated
  el.apiKey().addEventListener('input', () => {
    const v = el.apiKey().value.trim();
    if (v) localStorage.setItem(APIKEY_KEY, v);
    else   localStorage.removeItem(APIKEY_KEY);
  });
  el.apiKey().addEventListener('blur', () => {
    if (el.apiKey().value.trim()) { loadSessions(); loadTemplates(); loadUsage(); }
  });

  // Load sessions + templates on startup if key is already saved
  if (saved) { loadSessions(); loadTemplates(); }

  // Restore history
  try {
    const h = localStorage.getItem(STORAGE_KEY);
    if (h) S.history = JSON.parse(h);
  } catch (_) { S.history = []; }
  renderHistory();

  // Fetch version from /health and display in footer
  fetch('/health').then(r => r.json()).then(d => {
    const v = d.version || '';
    if (v) document.getElementById('footer-version').textContent = 'v' + v;
  }).catch(() => {});

  // Phase 63: load today's usage counter if API key is available
  if (saved) loadUsage();

  // Phase 66: keyboard shortcuts
  // Ctrl+Enter / Cmd+Enter is already handled by onTaskKeydown on the textarea.
  // Escape — cancel a running task from anywhere on the page
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && S.activeES) {
      e.preventDefault();
      cancelTask();
    }
  });
})();

// ── API key helpers ───────────────────────────────────────────────
// ── Phase 72: Light/Dark Mode ──────────────────────────────────────────────
function toggleTheme() {
  const light = document.body.classList.toggle('light-mode');
  localStorage.setItem('lf-theme', light ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = light ? '☀️' : '🌙';
}
function initTheme() {
  const saved = localStorage.getItem('lf-theme');
  // If no preference saved, use system preference
  const preferLight = saved ? saved === 'light'
    : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  if (preferLight) {
    document.body.classList.add('light-mode');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
}

function toggleKeyVisibility() {
  const inp = el.apiKey();
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function clearApiKey() {
  el.apiKey().value = '';
  localStorage.removeItem(APIKEY_KEY);
}

// ── File attachment (Phase 70) ────────────────────────────────────
function onFileAttach(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const MAX = 16384;  // 16 KB
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result || '';
    if (text.length > MAX) {
      appendSpan('\n[warn] File too large — truncated to 16 KB.\n', 'o-status');
    }
    S.attachText = text.slice(0, MAX);
    S.attachName = file.name;
    const nameEl = $('attach-name');
    if (nameEl) {
      nameEl.textContent = '📄 ' + file.name + ' (' + Math.round(text.length / 1024 * 10) / 10 + ' KB) ';
      const x = document.createElement('span');
      x.textContent = '✕';
      x.title = 'Remove attachment';
      x.style.cursor = 'pointer';
      x.onclick = clearAttachment;
      nameEl.appendChild(x);
    }
  };
  reader.readAsText(file);
  // Reset input so the same file can be re-selected after clearing
  input.value = '';
}

function clearAttachment() {
  S.attachText = null;
  S.attachName = null;
  const nameEl = $('attach-name');
  if (nameEl) nameEl.textContent = '';
}

// ── Model preference selector (Phase 58) ─────────────────────────
function setModelPref(pref) {
  S.modelPref = pref;
  document.querySelectorAll('.model-pref').forEach(b => b.classList.remove('active-pref'));
  const btn = $('mp-' + pref);
  if (btn) btn.classList.add('active-pref');
}

// ── Task rating (Phase 59) ────────────────────────────────────────
async function rateTask(taskId, rating) {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey || !taskId) return;
  try {
    await fetch('/tasks/' + taskId + '/annotate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ rating }),
    });
    // Highlight the chosen button
    const upBtn   = $('rb-up-'   + taskId);
    const downBtn = $('rb-down-' + taskId);
    if (upBtn)   upBtn.classList.toggle('rated',   rating === 1);
    if (downBtn) downBtn.classList.toggle('rated', rating === -1);
  } catch (_) { /* silent */ }
}

// ── Usage summary (Phase 63) ─────────────────────────────────────
async function loadUsage() {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) return;
  try {
    const res = await fetch('/usage/history?days=1', {
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok) return;
    const data = await res.json();
    const todayTok = (data.totals && data.totals.grand_total) || 0;
    const el2 = document.getElementById('footer-usage');
    const el3 = document.getElementById('footer-usage-today');
    if (el2 && el3) {
      el3.textContent = todayTok.toLocaleString();
      el2.style.display = '';
    }
  } catch (_) {}
}

// ── Task search (Phase 62) ────────────────────────────────────────
let _searchDebounce = null;

function onSearchInput(val) {
  clearTimeout(_searchDebounce);
  if (val.trim().length < 2) { clearSearchResults(); return; }
  _searchDebounce = setTimeout(() => doSearch(), 400);
}

function clearSearchResults() {
  const res = $('search-results');
  if (!res) return;
  res.querySelectorAll('.sr-item').forEach(n => n.remove());
  $('search-empty').style.display = 'none';
}

async function doSearch() {
  const apiKey = el.apiKey().value.trim();
  const q = ($('search-q') || {}).value?.trim();
  if (!apiKey || !q || q.length < 2) return;
  clearSearchResults();
  try {
    const res = await fetch('/tasks?q=' + encodeURIComponent(q) + '&limit=10', {
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok) return;
    const data = await res.json();
    renderSearchResults(data.tasks || []);
  } catch (_) {}
}

function renderSearchResults(tasks) {
  const container = $('search-results');
  const empty = $('search-empty');
  container.querySelectorAll('.sr-item').forEach(n => n.remove());
  if (!tasks.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tasks.forEach(t => {
    const div = document.createElement('div');
    div.className = 'sr-item';
    div.title = t.input || '';
    div.onclick = () => loadSearchResult(t);
    const badgeCls = t.status === 'complete' ? 'complete'
                   : t.status === 'failed'   ? 'error'
                   : t.status === 'running'  ? 'running'
                   : 'queued';
    const shortId = (t.task_id || '').slice(0, 8);
    const dateStr = t.created_at ? new Date(t.created_at).toLocaleDateString() : '';
    div.innerHTML =
      '<span class="hi-badge ' + badgeCls + '"></span>' +
      '<span class="sr-id">' + escapeHtml(shortId) + '…</span>' +
      '<span class="sr-agent">' + escapeHtml(t.agent_type || '') + '</span>' +
      '<span class="sr-input">' + escapeHtml((t.input || '').slice(0, 100)) + '</span>' +
      '<span class="sr-date">' + escapeHtml(dateStr) + '</span>';
    container.appendChild(div);
  });
}

function loadSearchResult(task) {
  el.taskInput().value = task.input || '';
  onTaskInput(el.taskInput());
  if (task.agent_type) el.agentType().value = task.agent_type;
  clearOutput();
  if (task.result) {
    appendResult((task.result || '').trim());
    appendSpan('\n[restored from search: ' + (task.task_id || '').slice(0, 8) + '… · ' + (task.status || '') + ']\n', 'o-status');
  } else {
    appendSpan('[task: ' + (task.task_id || '').slice(0, 8) + '… · ' + (task.status || '') + ']\n', 'o-status');
  }
  el.taskInput().focus();
}

// ── Prompt templates (Phase 61) ───────────────────────────────────
async function loadTemplates() {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) return;
  try {
    const res = await fetch('/templates', {
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok) return;
    const data = await res.json();
    S.templates = data.templates || [];
    renderTemplates();
  } catch (_) {}
}

function renderTemplates() {
  const list  = el.tmplList();
  const empty = el.tmplEmpty();
  el.tmplSummary().textContent = 'Templates (' + S.templates.length + ')';
  list.querySelectorAll('.tmpl-item').forEach(n => n.remove());
  if (S.templates.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  S.templates.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tmpl-item';
    div.title = t.input_template || '';
    div.innerHTML =
      '<span class="ti-name" onclick="loadTemplate(\'' + t.template_id + '\')">' + escapeHtml(t.name) + '</span>' +
      '<span class="ti-agent">' + escapeHtml(t.agent_type || '') + '</span>' +
      '<button class="btn ghost ti-del" onclick="deleteTemplate(\'' + t.template_id + '\')" title="Delete template">✕</button>';
    list.appendChild(div);
  });
}

function loadTemplate(templateId) {
  const t = S.templates.find(x => x.template_id === templateId);
  if (!t) return;
  el.taskInput().value = t.input_template;
  onTaskInput(el.taskInput());
  if (t.agent_type) el.agentType().value = t.agent_type;
  el.taskInput().focus();
}

async function saveTemplate() {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) { appendSpan('\n[error] Enter your API key first.\n', 'o-error'); return; }
  const input = el.taskInput().value.trim();
  if (!input) { appendSpan('\n[error] Enter a prompt to save as a template.\n', 'o-error'); return; }
  const name = window.prompt('Template name:', input.slice(0, 50));
  if (!name || !name.trim()) return;
  try {
    const res = await fetch('/templates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ name: name.trim(), input_template: input, agent_type: el.agentType().value }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      appendSpan('\n[error] ' + escapeHtml(err.detail || 'Could not save template') + '\n', 'o-error');
      return;
    }
    await loadTemplates();
    $('tmpl-section').setAttribute('open', '');
  } catch (e) {
    appendSpan('\n[error] ' + escapeHtml(e.message) + '\n', 'o-error');
  }
}

async function deleteTemplate(templateId) {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) return;
  if (!window.confirm('Delete this template?')) return;
  try {
    await fetch('/templates/' + templateId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    await loadTemplates();
  } catch (_) {}
}

// ── Session management (Phase 57) ─────────────────────────────────
async function loadSessions() {
  const apiKey = el.apiKey().value.trim();
  const picker = el.sessionPicker();
  if (!apiKey) {
    picker.innerHTML = '<option value="">— Standalone (no session) —</option>';
    S.sessionId = null;
    $('del-session-btn').style.display = 'none';
    return;
  }
  try {
    const res = await fetch('/sessions?limit=50', {
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok) return;
    const data = await res.json();
    const sessions = data.sessions || [];
    const prev = picker.value;
    picker.innerHTML = '<option value="">— Standalone (no session) —</option>' +
      sessions.map(s => {
        const label = (s.name || 'Session').replace(/"/g, '&quot;');
        const turns = s.turn_count || 0;
        return `<option value="${s.session_id}">${label} (${turns} turn${turns !== 1 ? 's' : ''})</option>`;
      }).join('');
    // Restore previous selection if it still exists
    if (prev && sessions.find(s => s.session_id === prev)) {
      picker.value = prev;
    }
    onSessionChange(picker.value);
  } catch (_) { /* network error — leave picker unchanged */ }
}

async function newSession() {
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) { appendSpan('\n[error] Enter your API key before creating a session.\n', 'o-error'); return; }
  const name = window.prompt('Session name (optional):', '');
  if (name === null) return; // user cancelled prompt
  const agent = el.agentType().value;
  try {
    const res = await fetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ name: name.trim(), agent_type: agent }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      appendSpan('\n[error] ' + escapeHtml(err.detail || 'Could not create session') + '\n', 'o-error');
      return;
    }
    const sess = await res.json();
    await loadSessions();
    el.sessionPicker().value = sess.session_id;
    onSessionChange(sess.session_id);
    appendSpan('\n[session created: ' + escapeHtml(sess.name || sess.session_id.slice(0, 8)) + ']\n', 'o-status');
  } catch (e) {
    appendSpan('\n[error] ' + escapeHtml(e.message) + '\n', 'o-error');
  }
}

async function deleteCurrentSession() {
  const sessionId = S.sessionId;
  if (!sessionId) return;
  if (!window.confirm('Delete this session? Tasks within it will be kept but unlinked.')) return;
  const apiKey = el.apiKey().value.trim();
  try {
    await fetch('/sessions/' + sessionId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
  } catch (_) { /* ignore */ }
  await loadSessions();
}

function onSessionChange(val) {
  S.sessionId = val || null;
  $('del-session-btn').style.display = val ? 'inline-flex' : 'none';
}

// ── Textarea auto-resize + char count ────────────────────────────
function onTaskInput(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 300) + 'px';
  const n = ta.value.length;
  el.charCount().textContent = n > 0 ? n + ' chars' : '';
}

// ── Keyboard shortcut: Cmd/Ctrl + Enter ──────────────────────────
function onTaskKeydown(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    submitTask();
  }
}

// ── Connection dot helpers ────────────────────────────────────────
function dotLive()   { el.connDot().className = 'live'; }
function dotPulse()  { const d = el.connDot(); d.className = 'pulse'; setTimeout(() => d.className = 'live', 1000); }
function dotError()  { el.connDot().className = 'error'; }
function dotIdle()   { el.connDot().className = ''; }

// ── Output helpers ────────────────────────────────────────────────
function clearOutputEl() {
  el.output().innerHTML = '<span class="o-ready">Ready. Enter a task above and press Submit.</span>';
  S.outputBuffer = '';
}

function appendSpan(text, cls) {
  if (!text && text !== 0) return;
  const out = el.output();
  // Remove ready placeholder on first real content
  const ready = out.querySelector('.o-ready');
  if (ready) ready.remove();

  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
  // Accumulate plain text for copy
  S.outputBuffer += text;
}

function appendHTML(html) {
  const out = el.output();
  const ready = out.querySelector('.o-ready');
  if (ready) ready.remove();
  const wrap = document.createElement('span');
  wrap.innerHTML = html;
  out.appendChild(wrap);
  out.scrollTop = out.scrollHeight;
}

// ── Status bar ────────────────────────────────────────────────────
function setStatus(cls, indicator, detail) {
  el.statusInd().className = cls;
  el.statusInd().textContent = indicator;
  el.statusDet().textContent = detail;
}
function clearStatus() {
  el.statusInd().className = '';
  el.statusInd().textContent = '';
  el.statusDet().textContent = '';
  el.elapsed().textContent = '';
}

// ── Elapsed timer ─────────────────────────────────────────────────
function startTimer() {
  S.startTime = Date.now();
  S.elapsedTimer = setInterval(() => {
    const s = ((Date.now() - S.startTime) / 1000).toFixed(1);
    el.elapsed().textContent = s + 's';
  }, 100);
}
function stopTimer() {
  clearInterval(S.elapsedTimer);
  S.elapsedTimer = null;
}
function elapsedSec() {
  return S.startTime ? ((Date.now() - S.startTime) / 1000).toFixed(1) : '0.0';
}

// ── Tool block management ─────────────────────────────────────────
let _toolBlockEl = null;

function openToolBlock(toolName, hint) {
  S.activeToolName = toolName;
  // Ensure we're on a new line
  appendSpan('\n');
  const wrap = document.createElement('span');
  wrap.className = 'tool-block';
  wrap.id = 'tool-block-' + toolName.replace(/\W/g, '_');
  // hint is the sanitized primary arg (query text or URL) — shown as tooltip
  if (hint) wrap.title = hint;
  wrap.innerHTML = '<span class="tool-status">▶</span> ' + escapeHtml(toolName);
  el.output().appendChild(wrap);
  el.output().scrollTop = el.output().scrollHeight;
  _toolBlockEl = wrap;
  S.outputBuffer += '\n▶ ' + toolName;
}

function closeToolBlock(toolName) {
  if (_toolBlockEl) {
    _toolBlockEl.classList.add('done');
    _toolBlockEl.querySelector('.tool-status').textContent = '✓';
    _toolBlockEl = null;
  }
  appendSpan('\n');
  S.outputBuffer += ' ✓\n';
  S.activeToolName = null;
}

// Called when a tool_blocked SSE event arrives (server-side confirmation)
// OR from finishRun for any still-open block (client-side fallback).
function markToolBlocked(toolName, description) {
  S.toolsBlocked++;
  const target = _toolBlockEl || document.getElementById('tool-block-' + (toolName || '').replace(/\W/g, '_'));
  if (target) {
    target.classList.add('blocked');
    target.querySelector('.tool-status').textContent = '⚠';
    // Add (i) icon only if not already present
    if (!target.querySelector('.tool-info')) {
      const info = document.createElement('span');
      info.className = 'tool-info';
      info.textContent = ' ⓘ';
      info.title = description ||
        'Tool call was blocked by the security system. ' +
        'The model has been instructed to retry with alternatives. ' +
        'If this persists, run: make verify-tool-registry';
      target.appendChild(info);
    }
    if (target === _toolBlockEl) {
      _toolBlockEl = null;
      S.activeToolName = null;
    }
  }
  appendSpan('\n');
  S.outputBuffer += ' ⚠\n';
}

// Post-process output DOM: replace '[UNVERIFIED DATA]' text nodes
// with a styled inline warning span. Called from finishRun after
// all tokens have been rendered.
function postProcessUnverified() {
  const MARKER = '[UNVERIFIED DATA]';
  const out = el.output();
  const walker = document.createTreeWalker(out, NodeFilter.SHOW_TEXT, null, false);
  const matches = [];
  let node;
  while ((node = walker.nextNode())) {
    if (node.textContent.includes(MARKER)) matches.push(node);
  }
  matches.forEach(textNode => {
    const parts = textNode.textContent.split(MARKER);
    const frag = document.createDocumentFragment();
    parts.forEach((part, i) => {
      if (part) frag.appendChild(document.createTextNode(part));
      if (i < parts.length - 1) {
        const warn = document.createElement('span');
        warn.className = 'o-unverified-marker';
        warn.textContent = '⚠ Unverified data';
        warn.title = 'This content could not be verified with live tools. ' +
                     'The model used training data or inference. Treat as speculative.';
        frag.appendChild(warn);
        S.outputBuffer = S.outputBuffer.replace(MARKER, '⚠ [UNVERIFIED DATA]');
      }
    });
    textNode.parentNode.replaceChild(frag, textNode);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Markdown renderer (Phase 64, pure JS, XSS-safe) ──────────────
// Security: we escape HTML first, then apply markdown transforms.
// This means user content cannot inject arbitrary HTML.
function renderMarkdown(raw) {
  // Step 1: escape all HTML
  let s = escapeHtml(raw);

  // Step 2: extract + protect fenced code blocks (``` ... ```)
  const codeBlocks = [];
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    const highlighted = lang ? highlightCode(code, lang.toLowerCase()) : code;
    codeBlocks.push('<pre><code>' + highlighted + '</code></pre>');
    return '\x00CB' + idx + '\x00';
  });

  // Step 3: line-level transforms
  const lines = s.split('\n');
  const out = [];
  let inUl = false, inOl = false;

  const closeList = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  };

  for (let line of lines) {
    // Code-block placeholder pass-through
    if (/^\x00CB\d+\x00$/.test(line.trim())) {
      closeList();
      out.push(line.trim());
      continue;
    }
    // Horizontal rule
    if (/^(---|\*\*\*|___)$/.test(line.trim())) {
      closeList(); out.push('<hr>'); continue;
    }
    // Headers
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) {
      closeList();
      const lvl = hm[1].length;
      out.push('<h' + lvl + '>' + inlineMarkdown(hm[2]) + '</h' + lvl + '>');
      continue;
    }
    // Unordered list
    const ulm = line.match(/^(\s*)([-*])\s+(.*)/);
    if (ulm) {
      if (!inUl) { if (inOl) { out.push('</ol>'); inOl = false; } out.push('<ul>'); inUl = true; }
      out.push('<li>' + inlineMarkdown(ulm[3]) + '</li>'); continue;
    }
    // Ordered list
    const olm = line.match(/^\s*\d+\.\s+(.*)/);
    if (olm) {
      if (!inOl) { if (inUl) { out.push('</ul>'); inUl = false; } out.push('<ol>'); inOl = true; }
      out.push('<li>' + inlineMarkdown(olm[1]) + '</li>'); continue;
    }
    closeList();
    if (line.trim() === '') { out.push('<p></p>'); }
    else { out.push('<p>' + inlineMarkdown(line) + '</p>'); }
  }
  closeList();

  let html = out.join('\n');

  // Step 4: restore code blocks
  codeBlocks.forEach((cb, i) => {
    html = html.replace('\x00CB' + i + '\x00', cb);
  });

  return html;
}

function inlineMarkdown(s) {
  // inline code (must come before bold/italic)
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold+italic ***
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // bold **
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic *
  s = s.replace(/\*([^*\s][^*]*)\*/g, '<em>$1</em>');
  // italic _
  s = s.replace(/_([^_\s][^_]*)_/g, '<em>$1</em>');
  return s;
}

// ── Syntax highlighting (Phase 67) ────────────────────────────────
function highlightCode(code, lang) {
  // code is already HTML-escaped; we add <span> tags for color.
  // Process in order: line-comments → block-comments → strings → keywords → numbers
  // Use NUL-delimited placeholders to avoid double-processing.
  const parts = [];
  const PH = (cls, txt) => { const k = '\x00H' + parts.length + '\x00'; parts.push('<span class="' + cls + '">' + txt + '</span>'); return k; };

  // Line comments (# for py/bash/yaml, // for js/ts/go/java/c/cpp, -- for sql)
  const lcPat = /([#].*$|\/\/.*$|--.*$)/gm;
  // Block comments /* ... */
  const bcPat = /\/\*[\s\S]*?\*\//g;
  // Triple-quoted strings (python)
  const tqPat = /("""[\s\S]*?"""|'''[\s\S]*?''')/g;
  // Regular strings: "..." and '...' (non-greedy, no newlines)
  const strPat = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g;

  // Apply block/triple first, then line comments, then strings
  code = code.replace(bcPat,  m => PH('syn-cmt', m));
  code = code.replace(tqPat,  m => PH('syn-str', m));
  code = code.replace(lcPat,  m => PH('syn-cmt', m));
  code = code.replace(strPat, m => PH('syn-str', m));

  // Keywords by language family
  const KW = {
    py:   /\b(def|class|import|from|return|if|elif|else|for|while|with|as|try|except|finally|pass|break|continue|lambda|yield|async|await|in|not|and|or|is|raise|del|global|nonlocal|assert|match|case)\b/g,
    js:   /\b(function|const|let|var|return|if|else|for|while|do|switch|case|break|continue|new|delete|typeof|instanceof|class|extends|import|export|default|async|await|try|catch|finally|throw|of|in|from|void|super|this|static)\b/g,
    go:   /\b(func|var|const|type|struct|interface|package|import|return|if|else|for|range|switch|case|break|continue|defer|go|chan|select|map|append|len|cap|make|new|delete)\b/g,
    sql:  /\b(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IN|IS|NULL|CREATE|TABLE|ALTER|DROP|INDEX|PRIMARY|KEY|FOREIGN|REFERENCES|UNIQUE|DEFAULT|VALUES|SET|LIMIT|ORDER|BY|GROUP|HAVING|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|RETURNING|WITH|CTE)\b/gi,
    bash: /\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|export|local|echo|exit|source|read|shift|set|unset)\b/g,
  };
  const BI = {
    py:   /\b(None|True|False|print|len|range|int|str|float|bool|list|dict|set|tuple|type|super|object|Exception|self|cls)\b/g,
    js:   /\b(true|false|null|undefined|NaN|Infinity|console|Promise|Array|Object|String|Number|Boolean|Math|JSON|Error|Map|Set|Symbol|window|document|fetch)\b/g,
    go:   /\b(true|false|nil|error|string|int|int64|float64|bool|byte|rune|uint|uint64)\b/g,
    sql:  null,
    bash: /\b(true|false|null|\$[A-Za-z_][A-Za-z0-9_]*)\b/g,
  };
  const langMap = { python: 'py', javascript: 'js', typescript: 'js', jsx: 'js', tsx: 'js',
    golang: 'go', shell: 'bash', sh: 'bash', zsh: 'bash', yaml: 'bash', sql: 'sql' };
  const l = langMap[lang] || lang;
  if (KW[l]) code = code.replace(KW[l], m => PH('syn-kw', m));
  if (BI[l]) code = code.replace(BI[l], m => PH('syn-bi', m));

  // Numbers (not inside placeholder tokens)
  code = code.replace(/\b(\d+\.?\d*)\b/g, (m, n) => PH('syn-num', n));

  // Restore placeholders
  parts.forEach((v, i) => { code = code.replace('\x00H' + i + '\x00', v); });
  return code;
}

// ── Copy result (Phase 65) ─────────────────────────────────────────
function appendResult(text) {
  appendHTML(
    '<div class="result-wrap">' +
    '<button class="btn ghost icon result-copy-btn" onclick="copyResultEl(this)" title="Copy result">⎘</button>' +
    '<span class="o-result">' + renderMarkdown(text) + '</span>' +
    '</div>'
  );
}

function copyResultEl(btn) {
  const span = btn.nextElementSibling;
  const text = span ? (span.innerText || span.textContent) : '';
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    // Fallback: select the result span
    const range = document.createRange();
    range.selectNodeContents(span);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

// ── Copy output ───────────────────────────────────────────────────
function copyOutput() {
  const text = S.outputBuffer || el.output().textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyOutput()"]');
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    // Fallback: select all text in output
    const range = document.createRange();
    range.selectNodeContents(el.output());
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

// ── Submit task ───────────────────────────────────────────────────
async function submitTask() {
  const apiKey = el.apiKey().value.trim();
  const task   = el.taskInput().value.trim();
  const agent  = el.agentType().value;

  if (!apiKey) { appendSpan('\n[error] Enter your API key first.\n', 'o-error'); return; }
  if (!task)   { appendSpan('\n[error] Enter a task first.\n', 'o-error'); return; }

  // Close any existing stream
  if (S.activeES) { S.activeES.close(); S.activeES = null; }

  // Reset UI
  el.output().innerHTML = '';
  S.outputBuffer = '';
  S.heartbeatCount = 0;
  S.toolsAttempted = 0;
  S.toolsCompleted = 0;
  S.toolsBlocked = 0;
  S.streamEl = null;
  _toolBlockEl = null;
  el.submitBtn().disabled = true;
  el.cancelBtn().style.display = 'inline-flex';
  setStatus('running', '● Running…', '');
  dotLive();
  startTimer();

  appendSpan('[submitting…]\n', 'o-status');

  let taskId, streamToken;
  try {
    const res = await fetch('/tasks', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + apiKey,
      },
      body: JSON.stringify({
        task, agent_type: agent, model_preference: S.modelPref,
        ...(S.sessionId   ? { session_id: S.sessionId }           : {}),
        ...(S.attachText  ? { attachment_text: S.attachText,
                              attachment_filename: S.attachName }  : {}),
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      const msg = err.detail || JSON.stringify(err);
      finishRun('error', msg);
      return;
    }

    const data = await res.json();
    taskId      = data.task_id;
    streamToken = data.stream_token;
    S.activeTaskId  = taskId;
    S.streamToken   = streamToken;

    setStatus('running', '● Running…', taskId.slice(0, 8) + '…');
    appendSpan('[queued: ' + taskId.slice(0,8) + '…]\n', 'o-status');
  } catch (e) {
    finishRun('error', 'Network error: ' + e.message);
    return;
  }

  // Subscribe to SSE
  openStream(taskId, streamToken, apiKey, agent, task);
}

// ── SSE stream ────────────────────────────────────────────────────
function openStream(taskId, streamToken, apiKey, agent, taskInput, retry = false) {
  // Stop any fallback polling before opening a fresh SSE connection
  if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; }
  const url = '/tasks/' + taskId + '/stream?stream_token=' + encodeURIComponent(streamToken);
  const es = new EventSource(url);
  S.activeES = es;

  es.addEventListener('task_start', () => {
    appendSpan('[agent started]\n', 'o-status');
  });

  es.addEventListener('chain_start', e => {
    try {
      const d = JSON.parse(e.data);
      if (d.node && d.node !== '__start__' && d.node !== 'LangGraph') {
        appendSpan('\n[' + d.node + ']\n', 'o-node');
      }
    } catch(_) {}
  });

  es.addEventListener('tool_start', e => {
    try {
      const d = JSON.parse(e.data);
      S.toolsAttempted++;
      openToolBlock(d.tool || 'tool', d.hint || '');
    } catch(_) { S.toolsAttempted++; openToolBlock('tool', ''); }
  });

  es.addEventListener('tool_end', e => {
    try {
      const d = JSON.parse(e.data);
      S.toolsCompleted++;
      closeToolBlock(d.tool || S.activeToolName || 'tool');
    } catch(_) { S.toolsCompleted++; closeToolBlock(S.activeToolName || 'tool'); }
  });

  // tool_blocked: SecureToolNode rejected the call — mark it immediately
  // so the user sees the ⚠ and (i) as soon as the event arrives, rather
  // than waiting until finishRun.
  es.addEventListener('tool_blocked', e => {
    try {
      const d = JSON.parse(e.data);
      markToolBlocked(d.tool || S.activeToolName || 'tool', d.description || '');
    } catch(_) { markToolBlocked(S.activeToolName || 'tool', ''); }
  });

  // Phase 69: accumulate tokens into a single DOM element (no span-per-token)
  es.addEventListener('token', e => {
    try {
      const d = JSON.parse(e.data);
      if (!d.delta) return;
      if (!S.streamEl) {
        appendSpan('\n', '');
        S.streamEl = document.createElement('div');
        S.streamEl.className = 'o-stream';
        el.output().appendChild(S.streamEl);
      }
      S.streamEl.textContent += d.delta;
      S.outputBuffer += d.delta;
      el.output().scrollTop = el.output().scrollHeight;
    } catch(_) {}
  });

  es.addEventListener('task_complete', e => {
    dotPulse();
    es.close(); S.activeES = null;
    try {
      const d = JSON.parse(e.data);
      // Phase 69: live task_complete now carries result inline — no REST round-trip needed.
      // fast-path (task already done at connect time) also sends inline result.
      const resultText = typeof d.result === 'string' ? d.result
                       : (d.result && d.result.output) ? d.result.output : '';
      if (resultText && resultText.trim()) {
        // Remove the streaming accumulator — replace with markdown-rendered final answer
        if (S.streamEl) { S.streamEl.remove(); S.streamEl = null; }
        appendResult(resultText.trim());
        const tokens = (d.tokens && (d.tokens.input || 0) + (d.tokens.output || 0)) || 0;
        finishRun('complete', '', taskId, agent, taskInput, tokens);
        return;
      }
    } catch(_) {}
    // Fallback: fetch from REST (shouldn't normally hit this path after Phase 69)
    if (S.streamEl) { S.streamEl.remove(); S.streamEl = null; }
    fetchTaskResult(taskId, apiKey, agent, taskInput);
  });

  es.addEventListener('task_error', e => {
    if (S.streamEl) { S.streamEl.remove(); S.streamEl = null; }
    try {
      const d = JSON.parse(e.data);
      finishRun('error', d.error || 'Unknown error', taskId, agent, taskInput, 0);
    } catch(_) { finishRun('error', 'Stream error', taskId, agent, taskInput, 0); }
    es.close();
    S.activeES = null;
  });

  es.addEventListener('task_cancelled', () => {
    if (S.streamEl) { S.streamEl.remove(); S.streamEl = null; }
    finishRun('cancelled', 'Task cancelled', taskId, agent, taskInput, 0);
    es.close();
    S.activeES = null;
  });

  es.addEventListener('heartbeat', () => {
    dotPulse();
    S.heartbeatCount++;
    // After the first silent heartbeat (15 s with no output) tell the user
    // that the model is likely loading — prevents "is it frozen?" confusion.
    if (S.heartbeatCount === 1 && !S.outputBuffer.trim()) {
      appendSpan('[model loading — first request may take up to 60 s…]\n', 'o-status');
    }
    // Start silent backup polling every 5 s when:
    //  (a) ≥2 heartbeats with no output yet  — slow Ollama cold-start, OR
    //  (b) ≥1 heartbeat with output present  — tokens streamed but
    //      task_complete event was dropped before the stream closed.
    // Backup poll fires fetchTaskResult when the task reaches a terminal
    // state, guaranteeing finishRun is called even if the SSE event is lost.
    if (!S.pollTimer && (
        (S.heartbeatCount >= 2 && !S.outputBuffer.trim()) ||
        (S.heartbeatCount >= 1 &&  S.outputBuffer.trim())
    )) {
      S.pollTimer = setInterval(async () => {
        if (S.activeTaskId !== taskId) { clearInterval(S.pollTimer); S.pollTimer = null; return; }
        try {
          const res = await fetch('/tasks/' + taskId, {
            headers: { 'Authorization': 'Bearer ' + apiKey },
          });
          if (!res.ok) return;
          const data = await res.json();
          if (data.status !== 'queued' && data.status !== 'running') {
            clearInterval(S.pollTimer); S.pollTimer = null;
            fetchTaskResult(taskId, apiKey, agent, taskInput);
          }
        } catch(_) {}
      }, 5000);
    }
  });

  es.onerror = () => {
    es.close();
    S.activeES = null;
    appendSpan('\n[stream disconnected — checking status…]\n', 'o-status');
    setTimeout(async () => {
      try {
        const res = await fetch('/tasks/' + taskId, {
          headers: { 'Authorization': 'Bearer ' + apiKey },
        });
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'complete' || data.status === 'failed' || data.status === 'cancelled') {
            // Already terminal — resolve immediately
            fetchTaskResult(taskId, apiKey, agent, taskInput);
            return;
          }
          // Still running: one SSE reconnect, then fall back to polling
          if (!retry) {
            appendSpan('[reconnecting stream…]\n', 'o-status');
            openStream(taskId, streamToken, apiKey, agent, taskInput, true);
          } else {
            // Second disconnect and still running — switch to polling
            pollTaskUntilComplete(taskId, apiKey, agent, taskInput);
          }
          return;
        }
      } catch(_) {}
      // Can't reach server: same reconnect/poll logic
      if (!retry) {
        openStream(taskId, streamToken, apiKey, agent, taskInput, true);
      } else {
        pollTaskUntilComplete(taskId, apiKey, agent, taskInput);
      }
    }, 800);
  };
}

// ── Fetch task result ─────────────────────────────────────────────
async function fetchTaskResult(taskId, apiKey, agent, taskInputText) {
  if (S.activeES) { S.activeES.close(); S.activeES = null; }
  if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; }
  try {
    const res = await fetch('/tasks/' + taskId, {
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok) {
      finishRun('complete', '', taskId, agent, taskInputText, 0);
      return;
    }
    const data = await res.json();
    // Task still in-progress — don't show empty result; switch to polling
    if (data.status === 'queued' || data.status === 'running') {
      pollTaskUntilComplete(taskId, apiKey, agent, taskInputText);
      return;
    }
    const tokObj = data.tokens || {};
    const tokens = (tokObj.input || 0) + (tokObj.output || 0);
    const result = data.result;
    const resultText = typeof result === 'string' ? result
                     : (result && result.output) ? result.output : '';
    if (resultText && resultText.trim() && !S.outputBuffer.includes(resultText.slice(0, 50).trim())) {
      appendSpan('\n', '');
      appendResult(resultText.trim());
    }
    if (data.status === 'failed') {
      finishRun('error', data.error || 'Task failed', taskId, agent, taskInputText, tokens);
    } else if (data.status === 'cancelled') {
      finishRun('cancelled', 'Task cancelled', taskId, agent, taskInputText, tokens);
    } else {
      finishRun('complete', '', taskId, agent, taskInputText, tokens);
    }
  } catch(_) {
    finishRun('complete', '', taskId, agent, taskInputText, 0);
  }
}

// ── Fallback polling (used when SSE disconnects twice mid-run) ────
function pollTaskUntilComplete(taskId, apiKey, agent, taskInputText) {
  if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; }
  appendSpan('[switching to polling — task still running…]\n', 'o-status');
  setStatus('running', '● Polling…', taskId.slice(0, 8) + '…');

  const poll = async () => {
    // Stop if the active task changed (user submitted a new task or cancelled)
    if (S.activeTaskId !== taskId) {
      clearInterval(S.pollTimer); S.pollTimer = null;
      return;
    }
    try {
      const res = await fetch('/tasks/' + taskId, {
        headers: { 'Authorization': 'Bearer ' + apiKey },
      });
      if (!res.ok) return; // transient — keep polling
      const data = await res.json();
      if (data.status === 'queued' || data.status === 'running') {
        setStatus('running', '● Still running…', taskId.slice(0, 8) + '… ' + elapsedSec() + 's');
        return; // keep polling
      }
      // Terminal state reached
      clearInterval(S.pollTimer); S.pollTimer = null;
      const tokObj = data.tokens || {};
      const tokens = (tokObj.input || 0) + (tokObj.output || 0);
      const result = data.result;
      const resultText = typeof result === 'string' ? result
                       : (result && result.output) ? result.output : '';
      if (resultText && resultText.trim() && !S.outputBuffer.includes(resultText.slice(0, 50).trim())) {
        appendSpan('\n', '');
        appendResult(resultText.trim());
      }
      if (data.status === 'failed') {
        finishRun('error', data.error || 'Task failed', taskId, agent, taskInputText, tokens);
      } else if (data.status === 'cancelled') {
        finishRun('cancelled', 'Task cancelled', taskId, agent, taskInputText, tokens);
      } else {
        finishRun('complete', '', taskId, agent, taskInputText, tokens);
      }
    } catch(_) {
      // Network hiccup — keep polling
    }
  };

  poll(); // immediate first check
  S.pollTimer = setInterval(poll, 4000);
}

// ── Finish run (all terminal states) ─────────────────────────────
function finishRun(status, detail, taskId, agent, taskInputText, tokens) {
  // Client-side fallback: if a tool block is still open (tool_start fired
  // but neither tool_end nor tool_blocked arrived — e.g. stream disconnected),
  // mark it blocked now.  tool_blocked SSE events mark blocks in real-time;
  // this catches any that slipped through.
  if (_toolBlockEl) {
    markToolBlocked(S.activeToolName || 'tool', '');
  }
  if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; }
  stopTimer();
  const elapsed = elapsedSec();

  el.submitBtn().disabled = false;
  el.cancelBtn().style.display = 'none';
  dotIdle();

  // Replace any '[UNVERIFIED DATA]' markers with styled inline warnings.
  postProcessUnverified();

  if (status === 'complete') {
    // If every tool call was blocked (none succeeded), warn the user that
    // the response is likely based on training data, not live information.
    if (S.toolsAttempted > 0 && S.toolsBlocked > 0 && S.toolsCompleted === 0) {
      appendHTML(
        '<span class="all-tools-failed-banner">' +
        '⚠ All tool calls were blocked — this response could not be verified with live data ' +
        'and may be based on training knowledge. Treat it as speculative.' +
        '</span>'
      );
      appendSpan('\n', '');
    }
    const tokenStr = tokens ? ' · ' + tokens.toLocaleString() + ' tokens est.' : '';
    const summary = '✓ Complete' + tokenStr + ' · ' + elapsed + 's';
    setStatus('complete', summary, '');
    appendSpan('\n' + summary + '\n', 'o-complete');
    // Phase 59: show thumbs up/down rating bar for completed tasks
    if (taskId) {
      const bar = document.createElement('div');
      bar.className = 'rating-bar';
      bar.id = 'rating-bar-' + taskId;
      bar.innerHTML =
        '<span style="color:var(--text-dim);font-size:12px;">Rate:</span>' +
        '<button class="btn ghost" id="rb-up-' + taskId + '" onclick="rateTask(\'' + taskId + '\',1)" title="Thumbs up">👍</button>' +
        '<button class="btn ghost" id="rb-down-' + taskId + '" onclick="rateTask(\'' + taskId + '\',-1)" title="Thumbs down">👎</button>';
      el.output().appendChild(bar);
    }
    saveHistory({ task_id: taskId, agent_type: agent, input_preview: taskInputText.slice(0, 80), status: 'complete', elapsed_ms: Math.round(parseFloat(elapsed) * 1000), tokens, ts: Date.now() });
  } else if (status === 'error') {
    setStatus('error', '✗ Error', detail);
    appendSpan('\n[error] ' + detail + '\n', 'o-error');
    saveHistory({ task_id: taskId, agent_type: agent, input_preview: (taskInputText || '').slice(0, 80), status: 'error', elapsed_ms: 0, tokens: 0, ts: Date.now() });
  } else if (status === 'cancelled') {
    setStatus('cancelled', '⊘ Cancelled', '');
    appendSpan('\n[cancelled]\n', 'o-cancelled');
    saveHistory({ task_id: taskId, agent_type: agent, input_preview: (taskInputText || '').slice(0, 80), status: 'cancelled', elapsed_ms: 0, tokens: 0, ts: Date.now() });
  }

  S.activeTaskId = null;

  // Refresh session list to update turn counts after a session task completes
  if (S.sessionId) loadSessions();

  // Phase 63: refresh today's usage counter after every task
  loadUsage();
}

// ── Cancel task ───────────────────────────────────────────────────
async function cancelTask() {
  const taskId = S.activeTaskId;
  if (!taskId) return;
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) return;

  el.cancelBtn().disabled = true;
  try {
    const res = await fetch('/tasks/' + taskId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + apiKey },
    });
    if (!res.ok && res.status !== 204) {
      appendSpan('\n[cancel failed: ' + res.status + ']\n', 'o-error');
      el.cancelBtn().disabled = false;
    }
    // The SSE stream will receive task_cancelled and finishRun will be called
  } catch (e) {
    appendSpan('\n[cancel error: ' + e.message + ']\n', 'o-error');
    el.cancelBtn().disabled = false;
  }
}

// ── Clear output ──────────────────────────────────────────────────
function clearOutput() {
  if (S.activeES) { S.activeES.close(); S.activeES = null; }
  if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; }
  stopTimer();
  clearOutputEl();
  clearStatus();
  dotIdle();
  el.submitBtn().disabled = false;
  el.cancelBtn().style.display = 'none';
  S.activeTaskId = null;
}

// ── History ───────────────────────────────────────────────────────
function saveHistory(entry) {
  S.history.unshift(entry);
  if (S.history.length > MAX_HISTORY) S.history.length = MAX_HISTORY;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.history)); } catch(_) {}
  renderHistory();
}

// Phase 73: export history as Markdown via GET /tasks/export?format=markdown
async function exportTasksMd(evt) {
  evt.stopPropagation();  // prevent <details> toggle
  const apiKey = el.apiKey().value.trim();
  if (!apiKey) { appendSpan('\n[error] Enter your API key to export.\n', 'o-error'); return; }
  try {
    const resp = await fetch('/tasks/export?format=markdown&limit=500', {
      headers: { Authorization: 'Bearer ' + apiKey }
    });
    if (!resp.ok) { appendSpan('\n[error] Export failed: ' + resp.status + '\n', 'o-error'); return; }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tasks_export.md';
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    appendSpan('\n[error] Export error: ' + e.message + '\n', 'o-error');
  }
}

function renderHistory() {
  const list = el.histList();
  const empty = el.histEmpty();
  el.histSummary().textContent = 'History (' + S.history.length + ')';

  if (S.history.length === 0) {
    empty.style.display = 'block';
    // Remove any existing items
    list.querySelectorAll('.history-item').forEach(n => n.remove());
    return;
  }
  empty.style.display = 'none';

  // Rebuild list — starred items float to top
  list.querySelectorAll('.history-item').forEach(n => n.remove());
  const sorted = S.history
    .map((h, i) => ({ h, i }))
    .sort((a, b) => (b.h.starred ? 1 : 0) - (a.h.starred ? 1 : 0));

  sorted.forEach(({ h, i }) => {
    const div = document.createElement('div');
    div.className = 'history-item' + (h.starred ? ' starred' : '');
    div.onclick = () => restoreHistory(i);
    div.title = h.input_preview;

    const badgeCls = h.status === 'complete' ? 'complete'
                   : h.status === 'error' || h.status === 'failed' ? 'error'
                   : h.status === 'cancelled' ? 'cancelled'
                   : 'queued';

    const tokenStr = h.tokens ? h.tokens.toLocaleString() + ' tok' : '';
    const shortId = (h.task_id || '').slice(0, 8);
    const starChar = h.starred ? '★' : '☆';

    div.innerHTML =
      '<span class="hi-badge ' + badgeCls + '"></span>' +
      '<span class="hi-star" title="' + (h.starred ? 'Unstar' : 'Star') + '" onclick="toggleStar(' + i + ',event)">' + starChar + '</span>' +
      '<span class="hi-id">' + escapeHtml(shortId) + '</span>' +
      '<span class="hi-agent">' + escapeHtml(h.agent_type || '') + '</span>' +
      '<span class="hi-input">' + escapeHtml(h.input_preview || '') + '</span>' +
      '<span class="hi-tokens">' + tokenStr + '</span>';

    list.appendChild(div);
  });
}

function restoreHistory(idx) {
  const h = S.history[idx];
  if (!h) return;
  el.taskInput().value = h.input_preview;
  onTaskInput(el.taskInput());
  if (h.agent_type) el.agentType().value = h.agent_type;
  // Show a note in output
  clearOutput();
  appendSpan('[restored task from history: ' + (h.task_id || '').slice(0,8) + '…]\n', 'o-status');
  appendSpan(h.input_preview + '\n', 'o-token');
  el.taskInput().focus();
}

// ── Task pinning / starring (Phase 68) ────────────────────────────
async function toggleStar(idx, event) {
  event.stopPropagation();  // Don't restore the task when starring
  const h = S.history[idx];
  if (!h) return;
  h.starred = !h.starred;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.history)); } catch(_) {}
  renderHistory();

  // Sync to server via labels API (best-effort — no error shown to user)
  const apiKey = el.apiKey().value.trim();
  if (!apiKey || !h.task_id) return;
  const labels = h.starred ? ['starred'] : [];
  try {
    await fetch('/tasks/' + h.task_id + '/labels', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ labels }),
    });
  } catch(_) {}
}
</script>
</body>
